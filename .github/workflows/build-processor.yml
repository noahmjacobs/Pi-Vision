name: Build Processor

on:
  release:
    types: [created]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd processor
          pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          cd processor
          python -m PyInstaller --noconfirm PiVision.spec

      - name: Create .dmg
        run: |
          cd processor
          rm -rf _dmg_stage
          mkdir _dmg_stage
          cp -r dist/PiVision.app _dmg_stage/PiVision.app
          ln -sf /Applications _dmg_stage/Applications
          hdiutil create -volname "PiVision Processor" -srcfolder _dmg_stage -ov -format UDZO PiVision-mac.dmg
          rm -rf _dmg_stage

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: processor/PiVision-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd processor
          pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          cd processor
          python -m PyInstaller --noconfirm --onefile --windowed --icon=icon.ico --name=PiVision app.py
          copy dist\PiVision.exe PiVision-windows.exe

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: processor/PiVision-windows.exe
